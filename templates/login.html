<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#ffffff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }
    .box{
      width:90%;
      max-width:380px;
      border:1px solid #dddddd;
      padding:24px;
    }
    h1{
      color:#8b0000;
      text-align:center;
      margin-top:0;
    }
    input{
      width:100%;
      padding:12px;
      border:1px solid #cccccc;
      box-sizing:border-box;
    }
    button{
      width:100%;
      margin-top:16px;
      padding:12px;
      border:none;
      background:#8b0000;
      color:white;
      cursor:pointer;
    }
    .messaggi{
      text-align:center;
      color:#8b0000;
      margin-bottom:10px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Admin Login</h1>

    {% with messaggi = get_flashed_messages() %}
      {% if messaggi %}
        <div class="messaggi">
          {% for m in messaggi %}
            <div>{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post">
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>

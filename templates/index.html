<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MED GALA Milano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      background:#ffffff;
      color:#8b0000;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      text-align:center;
    }
    .box{
      width:90%;
      max-width:700px;
    }
    .logo{
      font-size:64px;
      line-height:0.9;
      font-weight:bold;
      letter-spacing:2px;
      margin-bottom:20px;
    }
    .titolo{
      font-size:42px;
      margin:10px 0;
    }
    .sottotitolo{
      color:#111111;
      font-size:18px;
      margin-bottom:30px;
    }
    .bottone{
      display:inline-block;
      padding:14px 28px;
      border:1px solid #8b0000;
      color:#ffffff;
      background:#8b0000;
      text-decoration:none;
      font-size:16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">THE<br>MED</div>
    <div class="titolo">MED GALA</div>
    <div class="sottotitolo">A gala for med students from the universities of Milan</div>
    <a class="bottone" href="/aggiornamenti">Receive Updates</a>
  </div>
</body>
</html>
